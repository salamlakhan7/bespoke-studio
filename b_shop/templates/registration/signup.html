<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account | Bespoke Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1120; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-0 -left-20 w-96 h-96 bg-amber-500/10 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-0 -right-20 w-96 h-96 bg-blue-500/10 rounded-full blur-[120px] -z-10"></div>

    <div class="glass-card w-full max-w-xl p-10 md:p-14 rounded-[3rem] relative">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-amber-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-amber-500/30">
                <i class="fas fa-user-plus text-amber-500 text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">Begin Your <span class="text-amber-500 italic">Journey</span></h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mt-2">Design, Build, and Inherit Excellence</p>
        </div>

        <form method="post" action="{% url 'signup_customer' %}" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-500 text-xs">
                    Please correct the errors below.
                </div>
            {% endif %}

            <div class="grid md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" name="username" required class="input-glass w-full px-5 py-4 rounded-2xl text-sm" placeholder="e.g. salamlakhan7">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" name="email" required class="input-glass w-full px-5 py-4 rounded-2xl text-sm" placeholder="artisan@example.com">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" name="password1" required class="input-glass w-full px-5 py-4 rounded-2xl text-sm" placeholder="••••••••">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Confirm Password</label>
                    <input type="password" name="password2" required class="input-glass w-full px-5 py-4 rounded-2xl text-sm" placeholder="••••••••">
                </div>
            </div>

            <div class="p-4 bg-amber-500/5 border border-amber-500/20 rounded-2xl flex items-center gap-4">
                <i class="fas fa-id-badge text-amber-500"></i>
                <div>
                    <p class="text-[10px] font-bold text-white uppercase tracking-widest">Account Type</p>
                    <p class="text-[12px] text-amber-500 font-bold">Customer (Bespoke Designer)</p>
                </div>
            </div>

            <button type="submit" class="w-full py-5 bg-amber-600 hover:bg-amber-500 text-slate-900 font-black rounded-2xl transition-all shadow-xl shadow-amber-600/30 uppercase tracking-widest text-xs">
                Create Account & Open Lab
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">Already a member?</p>
            <a href="{% url 'login' %}" class="text-amber-500 font-bold text-sm hover:underline mt-1 inline-block">Sign In to Dashboard</a>
        </div>
    </div>
</body>
</html>
